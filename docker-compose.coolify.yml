services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://tokenturn:${SERVICE_PASSWORD_POSTGRES}@db:5432/tokenturn
    expose:
      - "3000"
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    environment:
      POSTGRES_USER: tokenturn
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: tokenturn
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tokenturn -d tokenturn"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  app-data:
  db-data:
