name: Release

# Signed releases with SBOM + provenance (spec 12). Pushing a v* tag builds
# the container image, pushes it to GHCR by digest, attaches a build
# provenance attestation (verifiable with `gh attestation verify`), and
# publishes a GitHub release carrying the SBOM (SPDX JSON).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # A release never ships untested.
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

      # Provenance: who built this image, from what commit, with what workflow.
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.meta.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # SBOM of the exact pushed image (SPDX JSON), attached to the release.
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - uses: softprops/action-gh-release@v2
        with:
          files: sbom.spdx.json
          generate_release_notes: true
          body: |
            Container image (pinned by digest):

            ```
            ${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}
            ```

            Verify the build provenance:

            ```
            gh attestation verify oci://${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }} --repo ${{ github.repository }}
            ```
