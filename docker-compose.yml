services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # The only env var the app reads. Everything else is configured in
      # Settings and stored in the database.
      DATABASE_URL: postgres://aipnl:aipnl@db:5432/aipnl
    volumes:
      - app-data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    # Pinned by digest (spec 12) - postgres:16-alpine
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    environment:
      POSTGRES_USER: aipnl
      POSTGRES_PASSWORD: aipnl
      POSTGRES_DB: aipnl
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aipnl -d aipnl"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app-data:
  db-data:
